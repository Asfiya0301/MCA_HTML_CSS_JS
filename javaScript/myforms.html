<!DOCTYPE html>
<html>
    <head>
        <title>My Form</title>
        <style>
            h1{
                text-align: center;
                font-family: 'Courier New', Courier, monospace;
            }

            body{
                background-color: rgb(197, 231, 248);
            }
            .form-box{
                background:rgb(141, 185, 199);
                padding: 20px;
                display: flex;
                flex-direction: column;
                width: 300px;
                margin: auto;
                gap: 10px;
                border-radius: 10px;
                box-shadow: 0 0 10px grey;
            }
            button{
    background-color: rgb(85, 170, 85);
}
        </style>
    </head>
    <body>
        <h1>Registration Form</h1>
        <form class="form-box" onsubmit="return validate()">
            <label>Name</label>
            <input type="text" id="name">
            <label>Email</label>
            <input type="email" id="email">
            <label>Password</label>
            <input type="password" id="pass">
            
            <button>submit</button>
        </form>
        <script>
            function validate(){
                let name = document.getElementById("name").value;
                let email = document.getElementById("email").value;
                let password = document.getElementById("pass").value;
                let pattern = /^(?=.*[A-Z])(?=.*[a-z])(?=.*[@#$&!?])(?=.*\d).{8,}$/;
                
                if(name == "" || email == "" || password == ""){
                    alert("All Fields Required");
                    return false;
                }
                
                if(!pattern.test(password)){
                    alert("Password must be 8+ chars with uppercase, lowercase, number, and special char @#$&!?");
                    return false;
                }

                alert("Form Submitted Successfully!");
                return true;
            }
        </script>
    </body>
</html>
